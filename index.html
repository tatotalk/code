<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autoplay YouTube Video with Sound</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0f0f0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .container {
            background: #1a1a1a;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            max-width: 900px;
            width: 100%;
            margin: 20px;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            background: #000;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .btn {
            background: #3ea6ff;
            color: #0f0f0f;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            letter-spacing: 0.3px;
        }
        .btn:hover {
            background: #65b8ff;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-secondary {
            background: #3a3a3a;
            color: #eee;
        }
        .btn-secondary:hover {
            background: #4a4a4a;
        }
        .info {
            color: #aaa;
            text-align: center;
            margin-top: 14px;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        .info a {
            color: #3ea6ff;
            text-decoration: none;
        }
        .info a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="video-wrapper">
        <!--
            The video ID is extracted from the URL:
            https://www.youtube.com/watch?v=dPD4mSuZmvU

            autoplay=1       → start playing as soon as the player is ready
            mute=1           → required by most browsers for autoplay to work
            enablejsapi=1    → allows JavaScript control via the YouTube IFrame API
            origin=...       → helps with security / API communication
        -->
        <iframe
            id="ytplayer"
            src="https://www.youtube.com/embed/dPD4mSuZmvU?autoplay=1&mute=1&enablejsapi=1&origin=<?= $_SERVER['HTTP_HOST'] ?? 'localhost' ?>"
            allow="autoplay; encrypted-media; fullscreen; picture-in-picture"
            allowfullscreen
        ></iframe>
    </div>

    <div class="controls">
        <button class="btn" id="unmuteBtn">🔊 Unmute &amp; Play with Sound</button>
        <button class="btn btn-secondary" id="reloadBtn">⟳ Reload &amp; Autoplay</button>
    </div>

    <div class="info">
        ⚠️ <strong>Note:</strong> Browsers block autoplay with sound until you interact with the page.
        Click the <strong>"Unmute &amp; Play with Sound"</strong> button or anywhere on the page to enable audio.
        <br />
        <a href="https://www.youtube.com/watch?v=dPD4mSuZmvU" target="_blank">Watch on YouTube ↗</a>
    </div>
</div>

<script>
    // Load the YouTube IFrame Player API asynchronously
    let player;

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('ytplayer', {
            events: {
                onReady: onPlayerReady,
                onStateChange: onPlayerStateChange,
            },
        });
    }

    function onPlayerReady(event) {
        console.log('Player ready – attempting autoplay (will be muted).');
        // The video should already be playing because of autoplay=1 & mute=1.
        // But if it's not, we try to play it.
        event.target.playVideo();
    }

    function onPlayerStateChange(event) {
        // If the video ends, we could loop it, but we'll leave that out.
        console.log('Player state changed:', event.data);
    }

    // --- Unmute logic ---

    function unmuteAndPlay() {
        if (player && typeof player.unMute === 'function') {
            player.unMute();
            player.playVideo();
            console.log('Unmuted and playing with sound.');
            document.getElementById('unmuteBtn').textContent = '🔊 Sound is ON';
            document.getElementById('unmuteBtn').style.opacity = '0.7';
            document.getElementById('unmuteBtn').style.cursor = 'default';
        } else {
            console.warn('Player not ready yet – try again.');
        }
    }

    // Button click to unmute
    document.getElementById('unmuteBtn').addEventListener('click', unmuteAndPlay);

    // Also unmute when user clicks anywhere on the page (to satisfy the "user gesture" requirement)
    document.addEventListener('click', function firstClickHandler() {
        // Only run once
        document.removeEventListener('click', firstClickHandler);
        // Small delay to let the click event propagate, then unmute
        setTimeout(unmuteAndPlay, 300);
    });

    // Reload button: refresh the iframe src to restart autoplay
    document.getElementById('reloadBtn').addEventListener('click', function () {
        const iframe = document.getElementById('ytplayer');
        const currentSrc = iframe.src;
        // Remove any existing timestamp to force a fresh load
        if (currentSrc.includes('&reload=')) {
            iframe.src = currentSrc.replace(/&reload=\d+/, '') + '&reload=' + Date.now();
        } else {
            iframe.src = currentSrc + '&reload=' + Date.now();
        }
        // Reset the unmute button text
        document.getElementById('unmuteBtn').textContent = '🔊 Unmute & Play with Sound';
        document.getElementById('unmuteBtn').style.opacity = '1';
        document.getElementById('unmuteBtn').style.cursor = 'pointer';
        console.log('Reloaded iframe.');
    });

    // --- Load the YouTube IFrame API ---
    // The API calls onYouTubeIframeAPIReady when it's loaded.
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
</script>

</body>
</html>
