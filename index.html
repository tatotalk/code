<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Force Sound (Impossible)</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #111; }
        .wrapper {
            position: relative;
            width: 560px;
            max-width: 100%;
            aspect-ratio: 16 / 9;
            cursor: pointer;
            background: #000;
        }
        #player {
            width: 100%;
            height: 100%;
        }
        /* This overlay catches the first click to start sound */
        .click-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.0); /* fully transparent, but captures clicks */
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
            font-family: Arial, sans-serif;
            pointer-events: auto;
            transition: opacity 0.5s;
        }
        .click-overlay:hover {
            background: rgba(0,0,0,0.2);
        }
        .click-overlay span {
            background: rgba(0,0,0,0.6);
            padding: 16px 32px;
            border-radius: 50px;
            border: 2px solid white;
            pointer-events: none;
        }
        .click-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .note {
            color: #ff6b6b;
            font-family: monospace;
            text-align: center;
            margin-top: 20px;
            max-width: 560px;
        }
    </style>
</head>
<body>
    <div style="display: flex; flex-direction: column; align-items: center;">
        <div class="wrapper" id="wrapper">
            <div id="player"></div>
            <div class="click-overlay" id="overlay">
                <span>▶ CLICK TO PLAY WITH SOUND</span>
            </div>
        </div>
        <div class="note">
            ⚠️ The video <strong>will NOT</strong> autoplay with sound. <br>
            Click the video above – that is the <em>only</em> way to start audio.
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        let forceAttempts = 0;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: 'dPD4mSuZmvU',
                playerVars: {
                    autoplay: 0,       // we will manually try to play
                    mute: 0,           // start with sound UNMUTED
                    controls: 1,
                    modestbranding: 1,
                    rel: 0
                },
                events: {
                    onReady: function(event) {
                        // --- ATTEMPT TO FORCE PLAY WITH SOUND ---
                        // This WILL be blocked by the browser.
                        player.playVideo(); // First attempt

                        // Try again after a tiny delay (still blocked)
                        setTimeout(() => {
                            player.playVideo();
                        }, 500);

                        // Try again after 2 seconds (still blocked)
                        setTimeout(() => {
                            player.playVideo();
                        }, 2000);

                        // Overlay click handler: THIS WORKS because it's a user gesture
                        const overlay = document.getElementById('overlay');
                        overlay.addEventListener('click', function() {
                            player.playVideo();   // plays with sound
                            overlay.classList.add('hidden');
                        });

                        // Also if they click anywhere else on the wrapper
                        document.getElementById('wrapper').addEventListener('click', function(e) {
                            if (e.target === this || e.target.id === 'player') {
                                player.playVideo();
                                overlay.classList.add('hidden');
                            }
                        });
                    },
                    onStateChange: function(event) {
                        // If the video somehow starts, hide overlay
                        if (event.data === YT.PlayerState.PLAYING) {
                            document.getElementById('overlay').classList.add('hidden');
                        }
                    }
                }
            });
        }

        // Fallback: if the API doesn't load, try to force via iframe src (but this also fails)
        // This is just a safety net.
    </script>
</body>
</html>
