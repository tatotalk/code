<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify Autoplay</title>
    <style>
        /* Minimal, dark-themed container */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #121212;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
        }
        .player-wrapper {
            width: 100%;
            max-width: 680px;
            background: #1e1e1e;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }
        .player-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
            color: #fff;
        }
        .spotify-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #1db954;
            font-weight: 600;
            font-size: 15px;
        }
        .spotify-badge svg {
            width: 24px;
            height: 24px;
            fill: #1db954;
        }
        .status-note {
            margin-left: auto;
            font-size: 12px;
            color: #a7a7a7;
            background: #2a2a2a;
            padding: 4px 14px;
            border-radius: 20px;
        }
        .iframe-container {
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }
        .iframe-container iframe {
            display: block;
            width: 100%;
            height: 352px;
            border: none;
            border-radius: 12px;
        }
        .player-footer {
            margin-top: 14px;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #6a6a6a;
        }
        .player-footer a {
            color: #6a6a6a;
            text-decoration: none;
            border-bottom: 1px dotted transparent;
            transition: 0.2s;
        }
        .player-footer a:hover {
            color: #1db954;
            border-bottom-color: #1db954;
        }
        @media (max-width: 560px) {
            .player-wrapper { padding: 16px; }
            .iframe-container iframe { height: 280px; }
        }
        @media (max-width: 400px) {
            .iframe-container iframe { height: 220px; }
        }
    </style>
</head>
<body>
    <div class="player-wrapper">
        <!-- header -->
        <div class="player-header">
            <span class="spotify-badge">
                <svg viewBox="0 0 24 24">
                    <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.36-.66.48-1.02.24-2.82-1.74-6.36-2.1-10.56-1.14-.42.12-.78-.12-.9-.54-.12-.42.12-.78.54-.9 4.56-1.02 8.46-.6 11.58 1.32.36.18.48.66.24 1.02zm1.44-3.3c-.3.42-.78.6-1.2.36-3.24-1.98-8.16-2.52-11.94-1.38-.48.12-1.02-.18-1.14-.66-.12-.48.18-1.02.66-1.14 4.26-1.26 9.6-.72 13.26 1.5.42.24.6.78.36 1.2zm.12-3.42c-.36.42-1.02.6-1.44.3-3.54-2.16-9.12-2.34-12.54-1.26-.54.18-1.14-.18-1.32-.72-.18-.54.18-1.14.72-1.32 4.02-1.26 10.14-1.02 14.22 1.38.42.24.6.84.36 1.32z"/>
                </svg>
                Spotify
            </span>
            <span class="status-note">⏵ autoplay requested</span>
        </div>

        <!-- iframe with autoplay=1 -->
        <div class="iframe-container">
            <iframe
                id="spotifyPlayer"
                src="https://open.spotify.com/embed/track/7mWZIQTibWOpop4BNCGkCF?utm_source=generator&si=88667ac239a34e96&autoplay=1"
                width="100%"
                height="352"
                frameBorder="0"
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                allowfullscreen
                loading="lazy"
            ></iframe>
        </div>

        <!-- footer -->
        <div class="player-footer">
            <span>🎵 <span style="color:#aaa;">Now playing</span> · Spotify Embed</span>
            <a href="https://open.spotify.com/track/7mWZIQTibWOpop4BNCGkCF" target="_blank" rel="noopener">
                open in Spotify →
            </a>
        </div>
    </div>
</body>
</html>
