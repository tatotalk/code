<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autoplay Song</title>
</head>
<body>

    <!-- The iframe with autoplay and mute enabled -->
    <iframe 
        width="560" 
        height="315" 
        src="https://www.youtube.com/embed/dPD4mSuZmvU?si=2JTcGzLILRFrqLmX&autoplay=1&mute=1" 
        title="YouTube video player" 
        frameborder="0" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
        referrerpolicy="strict-origin-when-cross-origin" 
        allowfullscreen>
    </iframe>

    <!-- Optional: A button to unmute the video after it starts playing -->
    <br>
    <button onclick="unmuteVideo()" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">
        🔊 Unmute Audio
    </button>

    <script>
        function unmuteVideo() {
            // Find the iframe and send a command to unmute it
            const iframe = document.querySelector('iframe');
            iframe.contentWindow.postMessage('{"event":"command","func":"unMute","args":""}', '*');
            // Also try to play it again just in case it paused
            iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
        }
    </script>

</body>
</html>
