<script>
  (function() {
    'use strict';

    const overlay = document.getElementById('click-overlay');
    const statusText = document.getElementById('status-text');
    const box = document.querySelector('.music-box');
    let player = null;
    let isPlaying = false;
    let playerReady = false;
    let soundTimeout = null;
    let fadeInterval = null;
    let playRequested = false;
    let activated = false; // prevent double triggers

    window.onYouTubeIframeAPIReady = function() {
      try {
        const playerVars = {
          autoplay: 0,
          mute: 0,
          controls: 0,
          modestbranding: 1,
          rel: 0,
          disablekb: 1
        };
        const origin = window.location.origin;
        if (origin && !origin.startsWith('file://')) {
          playerVars.origin = origin;
        }
        player = new YT.Player('player', {
          videoId: 'dPD4mSuZmvU',
          playerVars: playerVars,
          events: {
            onReady: function() {
              playerReady = true;
              console.log('✅ Player ready.');
              if (playRequested) startPlaySequence();
            },
            onError: function(e) {
              console.warn('⚠️ Player error:', e.data);
            }
          }
        });
      } catch (err) {
        console.error('YouTube init failed:', err);
      }
    };

    function fadeInVolume(targetVolume, duration) {
      if (fadeInterval) {
        clearInterval(fadeInterval);
        fadeInterval = null;
      }
      const startTime = Date.now();
      const startVol = 0;
      fadeInterval = setInterval(function() {
        const elapsed = Date.now() - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 1.5);
        const currentVol = Math.round(startVol + (targetVolume - startVol) * eased);
        if (player && typeof player.setVolume === 'function') {
          player.setVolume(currentVol);
        }
        if (progress >= 1) {
          clearInterval(fadeInterval);
          fadeInterval = null;
          if (player && typeof player.setVolume === 'function') {
            player.setVolume(targetVolume);
          }
          console.log('🔊 Fade-in complete.');
        }
      }, 50);
    }

    function startPlaySequence() {
      if (isPlaying || activated) return;
      if (!player || typeof player.playVideo !== 'function') {
        playRequested = true;
        return;
      }
      try {
        activated = true;
        overlay.classList.add('active');
        player.playVideo();
        player.setVolume(0);
        statusText.textContent = '✦ silent for 5s… ✦';
        statusText.classList.add('active');

        if (soundTimeout) clearTimeout(soundTimeout);
        soundTimeout = setTimeout(function() {
          if (player) {
            try {
              player.unMute();
              fadeInVolume(100, 3000);
              statusText.textContent = '✦ now playing ✦';
            } catch (err) {
              console.warn('Fade-in failed:', err);
            }
          }
          soundTimeout = null;
        }, 5000);

        isPlaying = true;
        playRequested = false;
        console.log('▶️ Play sequence started.');
      } catch (err) {
        console.warn('Play attempt failed:', err);
      }
    }

    // ── SCROLL TRIGGER (Intersection Observer) ──
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting && !activated) {
          startPlaySequence();
          observer.unobserve(box);
        }
      });
    }, { threshold: 0.5 });
    observer.observe(box);

    // ── CLICK FALLBACK (always works) ──
    overlay.addEventListener('click', function(e) {
      e.preventDefault();
      if (!activated) startPlaySequence();
    });

    // ── WISPS (unchanged) ──
    (function createWisps() {
      const container = document.getElementById('mono-bg');
      const count = 50;
      for (let i = 0; i < count; i++) {
        const wisp = document.createElement('div');
        wisp.className = 'wisp';
        const r = Math.random();
        if (r < 0.5) wisp.classList.add('small');
        else if (r < 0.85) wisp.classList.add('medium');
        else wisp.classList.add('large');
        wisp.style.left = (Math.random() * 100) + '%';
        wisp.style.bottom = (5 + Math.random() * 15) + '%';
        wisp.style.setProperty('--rise', (120 + Math.random() * 180) + 'px');
        wisp.style.setProperty('--drift', ((Math.random() - 0.5) * 100) + 'px');
        wisp.style.setProperty('--delay', (Math.random() * 5.0).toFixed(2) + 's');
        container.appendChild(wisp);
      }
      for (let i = 0; i < 6; i++) {
        const big = document.createElement('div');
        big.className = 'wisp large';
        big.style.left = (Math.random() * 100) + '%';
        big.style.bottom = (5 + Math.random() * 12) + '%';
        big.style.setProperty('--rise', (160 + Math.random() * 200) + 'px');
        big.style.setProperty('--drift', ((Math.random() - 0.5) * 120) + 'px');
        big.style.setProperty('--delay', (Math.random() * 7.0).toFixed(2) + 's');
        container.appendChild(big);
      }
    })();

    console.log('🌙 Music Box ready – scroll or click to start.');
  })();
</script>
