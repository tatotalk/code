<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Play with Sound</title>
    <style>
        /* Center the player and style the overlay */
        .player-wrapper {
            position: relative;
            width: 560px;
            max-width: 100%;
            height: 315px;
            cursor: pointer;
        }
        #player {
            width: 100%;
            height: 100%;
        }
        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 4rem;
            font-family: Arial, sans-serif;
            pointer-events: none; /* let clicks pass to the wrapper */
            transition: opacity 0.3s ease;
            border-radius: 8px;
        }
        .play-overlay span {
            background: rgba(0, 0, 0, 0.7);
            padding: 20px 30px;
            border-radius: 60px;
            pointer-events: none;
        }
        .play-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="player-wrapper" id="playerWrapper">
        <div id="player"></div>
        <div class="play-overlay" id="playOverlay">
            <span>▶</span>
        </div>
    </div>

    <!-- Load the YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let player;

        // This function is called automatically by the API when it's ready
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: 'dPD4mSuZmvU',
                playerVars: {
                    autoplay: 0,      // don't autoplay on load
                    mute: 0,          // start unmuted (sound on)
                    controls: 1,
                    modestbranding: 1,
                    rel: 0
                },
                events: {
                    onReady: function(event) {
                        // When the player is ready, we can set up the click handler
                        const wrapper = document.getElementById('playerWrapper');
                        const overlay = document.getElementById('playOverlay');

                        wrapper.addEventListener('click', function() {
                            // Play the video with sound (it will start because of user gesture)
                            player.playVideo();
                            // Hide the overlay
                            overlay.classList.add('hidden');
                        });
                    },
                    onStateChange: function(event) {
                        // If the video ends or is paused, you could show the overlay again if needed
                        // but we'll keep it simple.
                    }
                }
            });
        }
    </script>

</body>
</html>
