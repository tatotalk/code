<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>End Screen</title>
    <style>
        /* Reset & full page */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0e14;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* ----- LOADING SPINNER (shows while API loads) ----- */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            background: #0b0e14;
            color: rgba(255, 255, 255, 0.3);
            font-size: 1.2rem;
            letter-spacing: 0.2em;
            transition: opacity 0.5s ease;
        }
        #loader.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            width: 40px;
            height: 40px;
            margin-right: 20px;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-top: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ----- PERMANENT OVERLAY (covers the video forever) ----- */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1f2b, #0a0c12);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            user-select: none;
        }

        /* Title */
        #overlay h1 {
            font-size: clamp(2.5rem, 10vw, 5rem);
            font-weight: 300;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #e8edf5;
            text-shadow: 0 0 30px rgba(100, 150, 255, 0.15);
            margin-bottom: 0.5rem;
        }
        #overlay h1 span {
            display: inline-block;
            animation: glowPulse 3s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%, 100% { text-shadow: 0 0 20px rgba(100, 180, 255, 0.2); }
            50%    { text-shadow: 0 0 50px rgba(100, 180, 255, 0.6); }
        }

        /* Status text */
        #statusText {
            color: rgba(255, 255, 255, 0.35);
            font-size: 1.1rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 300;
            margin-top: 0.2rem;
            margin-bottom: 2.5rem;
            transition: color 0.5s ease;
        }
        #statusText.playing {
            color: rgba(100, 220, 150, 0.8);
        }

        /* ----- THE BUTTON ----- */
        #unlockBtn {
            font-size: 5rem;
            background: rgba(255, 255, 255, 0.04);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            width: 180px;
            height: 180px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.6);
            background: radial-gradient(circle at 30% 30%, #2a3344, #141920);
        }
        #unlockBtn:hover {
            transform: scale(1.06);
            border-color: rgba(255, 215, 100, 0.6);
            box-shadow: 0 0 80px rgba(255, 215, 100, 0.15);
        }
        #unlockBtn:active {
            transform: scale(0.95);
        }
        #unlockBtn.unlocked {
            border-color: rgba(100, 220, 150, 0.5);
            box-shadow: 0 0 80px rgba(100, 220, 150, 0.15);
            animation: breathe 2s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { box-shadow: 0 0 60px rgba(100, 220, 150, 0.1); }
            50%    { box-shadow: 0 0 100px rgba(100, 220, 150, 0.25); }
        }

        /* Hint */
        .hint {
            margin-top: 2rem;
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-weight: 300;
            transition: color 0.5s ease;
        }
        .hint.playing {
            color: rgba(100, 220, 150, 0.4);
        }

        /* ----- VIDEO CONTAINER (hidden behind overlay) ----- */
        #videoWrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: #000;
        }
        #player {
            width: 100%;
            height: 100%;
        }
        #player iframe {
            width: 100%;
            height: 100%;
            display: block;
            border: none;
        }

        /* Responsive */
        @media (max-width: 600px) {
            #unlockBtn {
                width: 140px;
                height: 140px;
                font-size: 4rem;
            }
            #overlay h1 {
                font-size: clamp(2rem, 8vw, 3.5rem);
            }
        }
    </style>
</head>
<body>

    <!-- ===== LOADING SCREEN ===== -->
    <div id="loader">
        <div class="spinner"></div>
        <span>Loading…</span>
    </div>

    <!-- ===== PERMANENT OVERLAY ===== -->
    <div id="overlay">
        <h1>✦ visit end screen ✦</h1>
        <div id="statusText">🔇 waiting to play</div>
        <button id="unlockBtn" aria-label="Unlock music">🔒</button>
        <div class="hint" id="hintText">click the lock to start</div>
    </div>

    <!-- ===== VIDEO PLAYER (hidden) ===== -->
    <div id="videoWrapper">
        <div id="player"></div>
    </div>

    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        (function() {
            // ---------- DOM refs ----------
            const loader = document.getElementById('loader');
            const unlockBtn = document.getElementById('unlockBtn');
            const statusText = document.getElementById('statusText');
            const hintText = document.getElementById('hintText');

            let player = null;
            let isPlaying = false;
            let playerReady = false;

            // ---------- FALLBACK: hide loader if API takes too long ----------
            const hideLoader = () => {
                if (loader) loader.classList.add('hidden');
            };
            // Hide loader after 3 seconds even if API is slow (prevents infinite loading)
            setTimeout(hideLoader, 3000);

            // ---------- YOUTUBE API READY ----------
            window.onYouTubeIframeAPIReady = function() {
                try {
                    // Prepare playerVars. DO NOT set 'origin' for local file://,
                    // but set it for hosted sites (GitHub Pages).
                    const playerVars = {
                        autoplay: 0,
                        mute: 0,
                        controls: 0,
                        modestbranding: 1,
                        rel: 0,
                        disablekb: 1
                    };

                    // Only add 'origin' if we are not on file:// protocol
                    const origin = window.location.origin;
                    if (origin && !origin.startsWith('file://')) {
                        playerVars.origin = origin;
                    }

                    player = new YT.Player('player', {
                        videoId: 'dPD4mSuZmvU',
                        playerVars: playerVars,
                        events: {
                            onReady: function(event) {
                                playerReady = true;
                                hideLoader();
                                console.log('✅ Player ready. Waiting for unlock.');
                            },
                            onError: function(event) {
                                console.warn('⚠️ YouTube player error:', event.data);
                                // If error 150 (embedding disabled) or 101, show a note
                                if (event.data === 150 || event.data === 101) {
                                    statusText.textContent = '⚠️ Video unavailable';
                                }
                                hideLoader();
                            },
                            onStateChange: function(event) {
                                if (event.data === YT.PlayerState.PLAYING) {
                                    isPlaying = true;
                                }
                            }
                        }
                    });
                } catch (e) {
                    console.error('Failed to init YouTube player:', e);
                    hideLoader();
                }
            };

            // ---------- UNLOCK BUTTON ----------
            unlockBtn.addEventListener('click', function(e) {
                if (isPlaying) return;

                // 1. Change emoji
                this.textContent = '🔐';
                this.classList.add('unlocked');

                // 2. Update UI
                statusText.textContent = '🎵 now playing';
                statusText.classList.add('playing');
                hintText.textContent = '✨ music is playing behind the screen';
                hintText.classList.add('playing');

                // 3. Play the video with sound
                if (player && typeof player.playVideo === 'function') {
                    try {
                        player.playVideo();
                        player.unMute();
                        isPlaying = true;
                    } catch (err) {
                        console.warn('Play attempt failed:', err);
                    }
                } else {
                    // Retry in case player isn't fully ready
                    setTimeout(() => {
                        if (player && typeof player.playVideo === 'function') {
                            try {
                                player.playVideo();
                                player.unMute();
                                isPlaying = true;
                            } catch (err) {
                                console.warn('Retry play failed:', err);
                            }
                        }
                    }, 300);
                }

                // Hide loader just in case
                hideLoader();
            });

            // ---------- FALLBACK: if the API script fails completely ----------
            // If after 5 seconds the player isn't ready, show a manual warning
            setTimeout(() => {
                if (!playerReady && !isPlaying) {
                    // Keep the loader hidden, but don't break the UI.
                    // The button will still work if the API loads late.
                    console.warn('YouTube API not ready after 5s. Click may retry.');
                }
                hideLoader();
            }, 5000);

            console.log('📄 Page loaded. Click the 🔒 to start the music behind the screen.');
        })();
    </script>

</body>
</html>
